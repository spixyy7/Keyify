<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyify – Nova lozinka</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>
    <script src="theme-init.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #F8F9FB; }
        h1, h2 { font-family: 'Outfit', sans-serif; }
        .form-input:focus { outline: none; border-color: #1D6AFF; box-shadow: 0 0 0 3px rgba(29,106,255,0.1); }
        .strength-bar { height: 4px; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-2xl font-black text-gray-900" style="font-family:'Poppins',sans-serif">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white text-base font-black"
                 style="background:linear-gradient(135deg,#1D6AFF,#A259FF)">K</div>
            Keyify
        </a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">

        <!-- Invalid token state -->
        <div id="invalid-state" class="hidden text-center">
            <div class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-4"
                 style="background:linear-gradient(135deg,#fee2e2,#fecaca)">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-900 mb-2">Link je istekao</h2>
            <p class="text-gray-500 text-sm mb-6">Ovaj link za reset lozinke je nevažeći ili je istekao. Zatražite novi.</p>
            <a href="login.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all text-sm">
                Nazad na prijavu
            </a>
        </div>

        <!-- Success state -->
        <div id="success-state" class="hidden text-center">
            <div class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-4"
                 style="background:linear-gradient(135deg,#d1fae5,#a7f3d0)">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-900 mb-2">Lozinka promenjena!</h2>
            <p class="text-gray-500 text-sm mb-6">Možete se sada prijaviti novom lozinkom.</p>
            <a href="login.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all text-sm">
                Prijavi se
            </a>
        </div>

        <!-- Reset form -->
        <div id="reset-form">
            <div class="text-center mb-6">
                <div class="w-14 h-14 mx-auto rounded-2xl flex items-center justify-center mb-4"
                     style="background:linear-gradient(135deg,#EEF3FF,#F0E6FF)">
                    <svg class="w-7 h-7" style="color:#1D6AFF" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-gray-900 mb-1">Postavi novu lozinku</h2>
                <p class="text-gray-500 text-sm">Unesite novu lozinku za vaš Keyify nalog.</p>
            </div>

            <p id="form-error" class="text-red-500 text-xs font-medium mb-3 hidden text-center"></p>

            <form novalidate class="space-y-4" onsubmit="submitReset(event)">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nova lozinka</label>
                    <div class="relative">
                        <input type="password" id="new-password" placeholder="Minimum 8 karaktera"
                               class="form-input w-full border border-gray-200 rounded-xl px-4 py-3 pr-12 text-sm text-gray-900 placeholder-gray-400 transition-all"
                               oninput="checkStrength(this.value)" />
                        <button type="button" onclick="toggleVis('new-password', this)"
                                class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Strength bar -->
                    <div class="mt-2 flex gap-1">
                        <div class="flex-1 h-1 rounded-full bg-gray-100 overflow-hidden">
                            <div id="s1" class="strength-bar w-0 h-full"></div>
                        </div>
                        <div class="flex-1 h-1 rounded-full bg-gray-100 overflow-hidden">
                            <div id="s2" class="strength-bar w-0 h-full"></div>
                        </div>
                        <div class="flex-1 h-1 rounded-full bg-gray-100 overflow-hidden">
                            <div id="s3" class="strength-bar w-0 h-full"></div>
                        </div>
                        <div class="flex-1 h-1 rounded-full bg-gray-100 overflow-hidden">
                            <div id="s4" class="strength-bar w-0 h-full"></div>
                        </div>
                    </div>
                    <p id="strength-label" class="text-xs mt-1 text-gray-400"></p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Potvrdi lozinku</label>
                    <input type="password" id="confirm-password" placeholder="Ponovite lozinku"
                           class="form-input w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-400 transition-all" />
                </div>

                <button type="submit" id="submit-btn"
                        class="w-full text-white font-semibold py-3.5 rounded-xl transition-all duration-200 shadow-sm text-sm mt-2"
                        style="background:linear-gradient(135deg,#1D6AFF,#A259FF)">
                    Sačuvaj lozinku
                </button>
            </form>
        </div>

    </div>

    <p class="text-center text-sm text-gray-400 mt-6">
        <a href="login.html" class="text-blue-600 font-medium hover:text-blue-700 transition-colors">← Nazad na prijavu</a>
    </p>
</div>

<script src="config.js"></script>
<script>
(function () {
    const API   = window.KEYIFY_CONFIG?.API_BASE || 'http://localhost:3001/api';
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
        document.getElementById('reset-form').classList.add('hidden');
        document.getElementById('invalid-state').classList.remove('hidden');
    }

    function toggleVis(id, btn) {
        const inp = document.getElementById(id);
        inp.type  = inp.type === 'password' ? 'text' : 'password';
    }

    function checkStrength(val) {
        let score = 0;
        if (val.length >= 8)              score++;
        if (/[A-Z]/.test(val))            score++;
        if (/[0-9]/.test(val))            score++;
        if (/[^A-Za-z0-9]/.test(val))     score++;
        const colors  = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'];
        const labels  = ['', 'Slaba', 'Osrednja', 'Dobra', 'Jaka'];
        for (let i = 1; i <= 4; i++) {
            const bar = document.getElementById('s' + i);
            bar.style.width   = i <= score ? '100%' : '0%';
            bar.style.background = colors[score] || '#e5e7eb';
        }
        document.getElementById('strength-label').textContent = val.length ? labels[score] : '';
        document.getElementById('strength-label').style.color = colors[score] || '';
    }

    async function submitReset(e) {
        e.preventDefault();
        const password = document.getElementById('new-password').value;
        const confirm  = document.getElementById('confirm-password').value;
        const errEl    = document.getElementById('form-error');
        errEl.classList.add('hidden');

        if (password.length < 8) {
            errEl.textContent = 'Lozinka mora biti min. 8 karaktera';
            errEl.classList.remove('hidden');
            return;
        }
        if (password !== confirm) {
            errEl.textContent = 'Lozinke se ne podudaraju';
            errEl.classList.remove('hidden');
            return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled    = true;
        btn.textContent = 'Sačekajte...';
        btn.style.opacity = '0.7';

        try {
            const res  = await fetch(`${API}/reset-password`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token, password }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);

            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
        } catch (err) {
            if (err.message.includes('istekao') || err.message.includes('važeći')) {
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('invalid-state').classList.remove('hidden');
            } else {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
                btn.disabled    = false;
                btn.textContent = 'Sačuvaj lozinku';
                btn.style.opacity = '';
            }
        }
    }

    window.submitReset  = submitReset;
    window.toggleVis    = toggleVis;
    window.checkStrength = checkStrength;
})();
</script>
</body>
</html>
